<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bytes OS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header span { font-size: 13px; color: #666; }

  nav {
    display: flex;
    gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid #1e1e1e;
  }

  nav button {
    background: none;
    border: none;
    color: #666;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  nav button:hover { color: #e8e8e8; }
  nav button.active { color: #e8e8e8; border-bottom-color: #f97316; }

  main { padding: 32px; }

  .tab { display: none; }
  .tab.active { display: block; }

  /* Summary cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .card {
    background: #161616;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 20px 24px;
  }

  .card-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card-value { font-size: 28px; font-weight: 700; }
  .card-value.orange { color: #f97316; }
  .card-value.red { color: #ef4444; }
  .card-value.green { color: #22c55e; }
  .card-value.blue { color: #3b82f6; }

  /* Tables */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #555;
    border-bottom: 1px solid #1e1e1e;
  }

  tbody tr {
    border-bottom: 1px solid #161616;
    transition: background 0.1s;
  }

  tbody tr:hover { background: #161616; }

  tbody td { padding: 12px 14px; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-red { background: #2d1010; color: #ef4444; }
  .badge-green { background: #0d2010; color: #22c55e; }
  .badge-gray { background: #1a1a1a; color: #888; }

  /* Expandable rows */
  .expand-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #888;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .expand-btn:hover { border-color: #444; color: #e8e8e8; }

  .detail-row { display: none; }
  .detail-row.open { display: table-row; }

  .detail-row td {
    padding: 0 14px 16px 32px;
    background: #111;
  }

  .detail-table {
    width: 100%;
    font-size: 12px;
    border-collapse: collapse;
  }

  .detail-table th {
    color: #444;
    font-size: 10px;
    text-transform: uppercase;
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid #1e1e1e;
  }

  .detail-table td { padding: 6px 10px; color: #aaa; }
  .detail-table tr:hover td { color: #e8e8e8; }

  .loading {
    text-align: center;
    padding: 60px;
    color: #444;
    font-size: 14px;
  }

  .section-title {
    font-size: 13px;
    color: #555;
    margin-bottom: 16px;
    font-weight: 500;
  }

  .amount { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<header>
  <h1>Bytes OS</h1>
  <span id="header-meta">loading...</span>
</header>

<nav>
  <button class="active" onclick="showTab('summary', this)">Summary</button>
  <button onclick="showTab('debt', this)">Debt</button>
  <button onclick="showTab('customers', this)">Customers</button>
</nav>

<main>
  <!-- Summary -->
  <div id="tab-summary" class="tab active">
    <div class="cards" id="summary-cards">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Debt -->
  <div id="tab-debt" class="tab">
    <p class="section-title" id="debt-subtitle"></p>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Total Owed</th>
            <th>Orders</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="debt-body">
          <tr><td colspan="4" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Customers -->
  <div id="tab-customers" class="tab">
    <p class="section-title" id="customers-subtitle"></p>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Total Orders</th>
            <th>Total Spend</th>
            <th>Last Order</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="customers-body">
          <tr><td colspan="5" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
  function showTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
  }

  function fmt(n) {
    return 'PKR ' + n.toLocaleString();
  }

  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}/${m}`;
  }

  function toggle(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
  }

  async function loadSummary() {
    const data = await fetch('/api/summary').then(r => r.json());
    document.getElementById('header-meta').textContent =
      `${data.totalOrders} orders · ${fmt(data.totalRevenue)} revenue`;

    document.getElementById('summary-cards').innerHTML = `
      <div class="card">
        <div class="card-label">Total Orders</div>
        <div class="card-value orange">${data.totalOrders}</div>
      </div>
      <div class="card">
        <div class="card-label">Total Revenue</div>
        <div class="card-value green amount">${fmt(data.totalRevenue)}</div>
      </div>
      <div class="card">
        <div class="card-label">Unpaid Amount</div>
        <div class="card-value red amount">${fmt(data.unpaidAmount)}</div>
      </div>
      <div class="card">
        <div class="card-label">Repeat Customers</div>
        <div class="card-value blue">${data.repeatCustomers}</div>
      </div>
    `;
  }

  async function loadDebt() {
    const data = await fetch('/api/debt').then(r => r.json());
    document.getElementById('debt-subtitle').textContent =
      `${data.length} customer${data.length !== 1 ? 's' : ''} with unpaid orders`;

    const rows = data.map((c, i) => {
      const detailRows = c.orders.map(o =>
        `<tr>
          <td>${fmtDate(o.date)}</td>
          <td>${o.slot || '—'}</td>
          <td>${o.order}</td>
          <td class="amount">${fmt(o.amount)}</td>
        </tr>`
      ).join('');

      return `
        <tr>
          <td><strong>${c.name}</strong></td>
          <td class="amount" style="color:#ef4444">${fmt(c.totalOwed)}</td>
          <td>${c.orders.length}</td>
          <td><button class="expand-btn" onclick="toggle('debt-detail-${i}')">details</button></td>
        </tr>
        <tr class="detail-row" id="debt-detail-${i}">
          <td colspan="4">
            <table class="detail-table">
              <thead><tr><th>Date</th><th>Slot</th><th>Order</th><th>Amount</th></tr></thead>
              <tbody>${detailRows}</tbody>
            </table>
          </td>
        </tr>
      `;
    }).join('');

    document.getElementById('debt-body').innerHTML = rows ||
      '<tr><td colspan="4" style="padding:24px;color:#555;text-align:center">No unpaid orders</td></tr>';
  }

  async function loadCustomers() {
    const data = await fetch('/api/customers').then(r => r.json());
    document.getElementById('customers-subtitle').textContent =
      `${data.length} repeat customer${data.length !== 1 ? 's' : ''} (ordered 2+ times)`;

    const rows = data.map((c, i) => {
      const detailRows = c.history.map(o =>
        `<tr>
          <td>${fmtDate(o.date)}</td>
          <td>${o.order}</td>
          <td class="amount">${fmt(o.amount)}</td>
          <td><span class="badge ${o.paid ? 'badge-green' : 'badge-red'}">${o.paid ? 'paid' : 'unpaid'}</span></td>
        </tr>`
      ).join('');

      return `
        <tr>
          <td><strong>${c.name}</strong></td>
          <td>${c.totalOrders}</td>
          <td class="amount">${fmt(c.totalSpend)}</td>
          <td>${fmtDate(c.lastOrderDate)}</td>
          <td><button class="expand-btn" onclick="toggle('cust-detail-${i}')">history</button></td>
        </tr>
        <tr class="detail-row" id="cust-detail-${i}">
          <td colspan="5">
            <table class="detail-table">
              <thead><tr><th>Date</th><th>Order</th><th>Amount</th><th>Status</th></tr></thead>
              <tbody>${detailRows}</tbody>
            </table>
          </td>
        </tr>
      `;
    }).join('');

    document.getElementById('customers-body').innerHTML = rows ||
      '<tr><td colspan="5" style="padding:24px;color:#555;text-align:center">No repeat customers</td></tr>';
  }

  loadSummary();
  loadDebt();
  loadCustomers();
</script>
</body>
</html>
